<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lista de Compras Premium</title>

  <style>
    body { font-family: system-ui; margin:0; background:#0f172a; color:#e2e8f0; }
    header { position:sticky; top:0; background:#020617; padding:15px; display:flex; justify-content:space-between; border-bottom:1px solid #1e293b; }
    .total { font-size:1.4rem; font-weight:bold; color:#22c55e; }
    .container { padding:12px; }

    .item { background:#020617; margin-bottom:10px; padding:12px; border-radius:12px; display:flex; align-items:center; gap:10px; border:1px solid #1e293b; }
    .item-name { flex:1; }
    .checked { text-decoration: line-through; opacity:0.5; }

    input { padding:8px; border-radius:8px; border:none; background:#1e293b; color:white; }
    .price { width:90px; text-align:right; }

    .delete-btn { background:#ef4444; color:white; border:none; border-radius:8px; padding:6px 10px; cursor:pointer; }

    .footer { position:sticky; bottom:0; background:#020617; padding:10px; border-top:1px solid #1e293b; }
    .input-group { display:flex; gap:8px; }
    .input-group input { flex:1; }

    .add-btn { background:#3b82f6; color:white; border:none; border-radius:8px; padding:10px; cursor:pointer; }
    .reset-btn { width:100%; margin-top:8px; background:#ef4444; color:white; border:none; border-radius:8px; padding:10px; cursor:pointer; }
  </style>
</head>
<body>

<header>
  <span>Total</span>
  <span class="total">R$ <span id="total">0.00</span></span>
</header>

<div class="container" id="list"></div>

<div class="footer">
  <div class="input-group">
    <input id="name" placeholder="Produto"/>
    <input id="qty" type="number" placeholder="Qtd"/>
    <button class="add-btn" onclick="addItem()">+</button>
  </div>
  <button class="reset-btn" onclick="resetList()">Resetar Lista</button>
</div>

<script>
let items = JSON.parse(localStorage.getItem('items')) || [];

function save() {
  localStorage.setItem('items', JSON.stringify(items));
}

function formatCents(value) {
  const num = (parseInt(value || '0', 10) || 0) / 100;
  return num.toFixed(2);
}

function calcTotal() {
  let total = 0;
  items.forEach(i => {
    if (i.checked && i.priceCents) {
      total += (parseInt(i.priceCents, 10) || 0) / 100;
    }
  });
  document.getElementById('total').innerText = total.toFixed(2);
}

function render() {
  const list = document.getElementById('list');
  list.innerHTML = '';

  items.forEach((item, index) => {
    const priceDisplay = item.priceCents ? formatCents(item.priceCents) : '';

    const div = document.createElement('div');
    div.className = 'item';

    div.innerHTML = `
      <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggle(${index})" />
      <span class="item-name ${item.checked ? 'checked' : ''}">${item.name} (${item.qty})</span>
      ${item.checked ? `<input class="price" inputmode="numeric" value="${priceDisplay}" oninput="handlePriceInput(event, ${index})" />` : ''}
      <button class="delete-btn" onclick="removeItem(${index})">✕</button>
    `;

    list.appendChild(div);
  });

  calcTotal();
  save();
}

function toggle(index) {
  items[index].checked = !items[index].checked;
  render();
}

function handlePriceInput(event, index) {
  const input = event.target;

  let digits = input.value.replace(/\D/g, '');
  items[index].priceCents = digits;

  input.value = formatCents(digits);

  calcTotal();
  save();
}

function addItem() {
  const name = document.getElementById('name').value;
  const qty = document.getElementById('qty').value || 1;

  if (!name) return;

  items.push({ name, qty, priceCents: '', checked: false });

  document.getElementById('name').value = '';
  document.getElementById('qty').value = '';

  render();
}

function removeItem(index) {
  items.splice(index, 1);
  render();
}

function resetList() {
  if (confirm('Deseja apagar tudo?')) {
    items = [];
    render();
  }
}

render();
</script>

</body>
</html>
