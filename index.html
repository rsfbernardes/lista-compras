<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lista de Compras Premium</title>

<style>
body { font-family: system-ui; margin:0; background:#0f172a; color:#e2e8f0; }

header {
  position:sticky;
  top:0;
  background:#020617;
  padding:15px;
  border-bottom:1px solid #1e293b;
}

.total { font-size:1.4rem; font-weight:bold; }

.container { padding:12px; }

.item {
  background:#020617;
  margin-bottom:10px;
  padding:12px;
  border-radius:12px;
  display:flex;
  align-items:center;
  gap:10px;
  border:1px solid #1e293b;
}

.item-name { flex:1; }
.checked { text-decoration: line-through; opacity:0.5; }

input {
  padding:8px;
  border-radius:8px;
  border:none;
  background:#1e293b;
  color:white;
  min-width: 0;
}

.price { width:90px; text-align:right; }

.delete-btn {
  background:#ef4444;
  color:white;
  border:none;
  border-radius:8px;
  padding:6px 10px;
  cursor:pointer;
}

.footer {
  position:sticky;
  bottom:0;
  background:#020617;
  padding:10px;
  border-top:1px solid #1e293b;
}

.input-group {
  display:flex;
  gap:8px;
  margin-bottom:8px;
}

.input-group input {
  flex:1;
}

.qty-input {
  max-width:70px;
}

.add-btn {
  background:#3b82f6;
  color:white;
  border:none;
  border-radius:8px;
  padding:10px;
  cursor:pointer;
  flex-shrink:0;
}

.reset-btn {
  width:100%;
  background:#ef4444;
  color:white;
  border:none;
  border-radius:8px;
  padding:10px;
  cursor:pointer;
}

.progress-container {
  height:6px;
  background:#1e293b;
}

.progress-bar {
  height:6px;
  width:0%;
  background:#22c55e;
  transition:0.3s;
}
</style>
</head>
<body>

<header>
  <div>Total</div>
  <div id="warning" style="font-size:12px; color:#ef4444; display:none;">
  ⚠️ Orçamento excedido
</div>
  <div id="total" class="total">R$ 0.00</div>
  <div id="budgetInfo" style="font-size:12px; opacity:0.7;"></div>
</header>

<div class="progress-container">
  <div id="progressBar" class="progress-bar"></div>
</div>

<div class="container" id="list"></div>

<div class="footer">
  <div class="input-group">
    <input id="name" placeholder="Produto"/>
    <input id="qty" class="qty-input" type="number" placeholder="Qtd"/>
    <button class="add-btn" onclick="addItem()">+</button>
  </div>

  <div class="input-group">
    <input id="budget" placeholder="Orçamento" inputmode="numeric"/>
  </div>

  <button class="reset-btn" onclick="resetList()">Resetar Lista</button>
</div>

<script>
let items = JSON.parse(localStorage.getItem('items')) || [];
let budget = localStorage.getItem('budget') || '';

document.getElementById('budget').value = budget ? (parseInt(budget)/100).toFixed(2) : '';

function save() {
  localStorage.setItem('items', JSON.stringify(items));
  localStorage.setItem('budget', budget);
}

function formatCents(value) {
  const num = (parseInt(value || '0', 10) || 0) / 100;
  return num.toFixed(2);
}

function calcTotal() {
  let total = 0;

  items.forEach(i => {
    if (i.checked && i.priceCents) {
      const price = (parseInt(i.priceCents, 10) || 0) / 100;
      const qty = parseInt(i.qty) || 1;
      total += price * qty;
    }
  });

  document.getElementById('total').innerText = `R$ ${total.toFixed(2)}`;

  const budgetValue = (parseInt(budget || '0') || 0) / 100;
  const info = document.getElementById('budgetInfo');
  const bar = document.getElementById('progressBar');

  if (budgetValue > 0) {
    info.innerText = `de R$ ${budgetValue.toFixed(2)}`;

    const percent = (total / budgetValue) * 100;
    bar.style.width = Math.min(percent, 100) + '%';

    if (percent < 70) bar.style.background = '#22c55e';
    else if (percent < 100) bar.style.background = '#facc15';
    else bar.style.background = '#ef4444';
  } else {
    info.innerText = '';
    bar.style.width = '0%';
  }
}

function render() {
  const list = document.getElementById('list');
  list.innerHTML = '';

  items.forEach((item, index) => {
    const priceDisplay = item.priceCents ? formatCents(item.priceCents) : '';

    const div = document.createElement('div');
    div.className = 'item';

    div.innerHTML = `
      <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggle(${index})" />
      <span class="item-name ${item.checked ? 'checked' : ''}">
        ${item.qty}x ${item.name}
      </span>
      ${item.checked ? `<input class="price" inputmode="numeric" value="${priceDisplay}" oninput="handlePriceInput(event, ${index})" />` : ''}
      <button class="delete-btn" onclick="removeItem(${index})">✕</button>
    `;

    list.appendChild(div);
  });

  calcTotal();
  save();
}

function toggle(index) {
  items[index].checked = !items[index].checked;
  render();
}

function handlePriceInput(event, index) {
  const input = event.target;
  let digits = input.value.replace(/\D/g, '');

  items[index].priceCents = digits;
  input.value = formatCents(digits);

  calcTotal();
  save();
}

function addItem() {
  const name = document.getElementById('name').value;
  const qty = document.getElementById('qty').value || 1;

  if (!name) return;

  items.push({ name, qty, priceCents: '', checked: false });

  document.getElementById('name').value = '';
  document.getElementById('qty').value = '';

  render();
}

function removeItem(index) {
  items.splice(index, 1);
  render();
}

function resetList() {
  if (confirm('Deseja apagar tudo?')) {
    items = [];
    budget = '';
    document.getElementById('budget').value = '';
    render();
  }
}

document.getElementById('budget').addEventListener('input', (e) => {
  let digits = e.target.value.replace(/\D/g, '');
  budget = digits;
  e.target.value = (parseInt(digits || '0') / 100).toFixed(2);

  calcTotal();
  save();
});

const warning = document.getElementById('warning');

if (budgetValue > 0 && total > budgetValue) {
  warning.style.display = 'block';
} else {
  warning.style.display = 'none';
}

render();
</script>

</body>
</html>
